name: E2E Tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright Golden-Path E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Build server binary
        run: cargo build --release

      - name: Start Model UN server
        run: |
          RUST_LOG=info ./target/release/modelun &
          echo $! > /tmp/modelun.pid
          echo "Server PID: $(cat /tmp/modelun.pid)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port 3000..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/index.html > /dev/null 2>&1; then
              echo "Server is ready."
              exit 0
            fi
            echo "Attempt $i/30 – not ready yet, sleeping 2s..."
            sleep 2
          done
          echo "Server did not become ready in time."
          exit 1

      - name: Run E2E tests
        working-directory: e2e
        env:
          BASE_URL: http://127.0.0.1:3000
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload Playwright test results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 30

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/modelun.pid ]; then
            kill "$(cat /tmp/modelun.pid)" || true
          fi
